name: Build PK3
description: Builds the PK3
runs:
  using: "composite"
  steps:
  - uses: actions/checkout@v4
  - uses: montudor/action-zip@v1
    with:
      args: zip -r "RRRRweapons-${{ env.SUFFIX }}.pk3" . -i graphics/* patches/* sounds/* sprites/* zscript/* CHANGELOG.md CVARINFO HDCINFO LANGUAGE LICENSE MAPINFO MENUDEF README.md SNDINFO TEXTURES ZSCRIPT.zs
